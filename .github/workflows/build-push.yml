name: Build and push TFCL TF2 server image

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # Rebuild weekly even with no repo changes, so the upstream
  # ghcr.io/melkortf/tf2-competitive base image's own updates (new SourceMod
  # builds, base cfg fixes, etc.) get picked up into our layered image too.
  # (Day-to-day TF2/steamcmd updates are handled at container *boot* via the
  # base image's -autoupdate flag - this schedule is only for the base image
  # layer itself, which only changes when melkortf pushes a new version.)
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # no-cache: the whole point of this image is to always re-pull the
          # upstream base image's `latest` tag rather than reuse a stale
          # cached layer, so scheduled/manual rebuilds actually pick up
          # upstream changes.
          pull: true
          tags: |
            ghcr.io/sidular/tfcl-tf2-server:latest
            ghcr.io/sidular/tfcl-tf2-server:${{ github.sha }}
