name: Build and push TFCL TF2 server image

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: |
            ghcr.io/sidular/tfcl-tf2-server:latest
            ghcr.io/sidular/tfcl-tf2-server:${{ github.sha }}
