// SourceMod core config - executed automatically after server.cfg on EVERY map change.
// Deploy to: /home/tf2/server/tf/cfg/sourcemod/sourcemod.cfg (on the host: /opt/tf2-server/tf/cfg/sourcemod/sourcemod.cfg)
//
// This is the single global override point for the "mapdownloader" plugin
// (https://github.com/spiretf/mapdownloader), which is baked into the
// melkortf/tf2-competitive base image and auto-downloads any map the server
// doesn't have locally when a changelevel is issued (RCON, mapcycle, etc).
//
// The plugin's cvar (sm_map_download_base) defaults to https://fastdl.serveme.tf/maps
// and is independent of the DOWNLOAD_URL env var / sv_downloadurl cvar (which only
// controls what URL is handed to *connecting clients* for their own FastDL content
// downloads). Setting it here switches the *server's own* map-fetching source to
// TFCL's map host instead of serveme's FastDL mirror.

sm_map_download_base "https://maps.tfcleague.com"
