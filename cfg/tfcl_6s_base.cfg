// TFCL 6v6 Base Config
// DO NOT EXEC THIS MANUALLY

exec "tfcl_base"                               // execs base config that every gamemode shares
exec "tfcl_any_custom"                         // execs the custom settings in any_custom
exec "tfcl_6s_custom"                          // execs the custom settings in 6s_custom

mp_tournament_whitelist "cfg/tfcl_whitelist_6s.txt"  // sets whitelist
tftrue_whitelist_id "tfcl_6v6"              // sets tftrue whitelist if you have tftrue installed

tf_tournament_classlimit_scout "2"             // 2 scouts
tf_tournament_classlimit_soldier "2"           // 2 soldiers
tf_tournament_classlimit_pyro "2"              // max 2 pyros
tf_tournament_classlimit_demoman "1"           // 1 demoman
tf_tournament_classlimit_heavy "1"             // max 1 heavy
tf_tournament_classlimit_engineer "1"          // max 1 engineer
tf_tournament_classlimit_medic "1"             // 1 medic
tf_tournament_classlimit_sniper "1"            // max 1 sniper
tf_tournament_classlimit_spy "2"               // max 2 spies
