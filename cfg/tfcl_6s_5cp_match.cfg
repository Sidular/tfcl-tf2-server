// TFCL 6v6 5cp Match (Progressive) Config
// EXEC THIS MANUALLY, DO NOT EXEC THE BASE.CFG
// First to 5 wins the match, or if time limit is hit, the new win limit is 1 + current leading score.

exec "tfcl_6s_base"

servercfgfile "tfcl_6s_5cp_match"             // sets server cfg to this config so that it gets autoexeced on level change
mp_tournament_whitelist "cfg/tfcl_whitelist_6s.txt"

sm plugins load improved_match_timer          // loads the improved match timer

mp_timelimit "30"                             // sets server timelimit to 30 minutes
mp_winlimit "5"                               // sets number of wins to win the match to 5
mp_windifference "0"                          // unsets windifference
mp_maxrounds "0"                              // unsets maxrounds

mp_timelimit_improved "1"		              // enables the Improved Match Timer plugin
mp_roundtime "240"                            // sets round timer to 4 minutes

mp_tournament_restart                         // restarts the tournament to apply above settings

say "TFCL 6v6 5cp Match Config Executed."
say "First to 5 wins the match. If time limit is hit, new win limit = 1 + current leading score."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "Exec tfcl_off or restart your server 90 seconds after you have fully finished playing."
