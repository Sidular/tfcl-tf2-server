// TFCL Highlander Base Config
// DO NOT EXEC THIS MANUALLY

exec "tfcl_base"                               // execs base config that every gamemode shares
exec "tfcl_any_custom"                         // execs the custom settings in any_custom
exec "tfcl_HL_custom"                          // execs the custom settings in HL_custom

mp_tournament_whitelist "cfg/tfcl_whitelist_HL.txt"  // sets whitelist
tftrue_whitelist_id "ugc_9v9"              // sets tftrue whitelist if you have tftrue installed

mp_highlander "1"                              // enables highlander mode (1 of each class)

tf_tournament_classlimit_scout "-1"            // unsets class limits (mp_highlander enforces 1-per-class)
tf_tournament_classlimit_soldier "-1"
tf_tournament_classlimit_pyro "-1"
tf_tournament_classlimit_demoman "-1"
tf_tournament_classlimit_heavy "-1"
tf_tournament_classlimit_engineer "-1"
tf_tournament_classlimit_medic "-1"
tf_tournament_classlimit_sniper "-1"
tf_tournament_classlimit_spy "-1"
