// TFCL 6v6 KoTH Best of 5 Config (Playoffs)
// EXEC THIS MANUALLY, DO NOT EXEC THE BASE.CFG
// Winlimit 3, no timelimit, single half (first to 3 rounds wins).

exec "tfcl_6s_base"

servercfgfile "tfcl_6s_koth_bo5"             // sets server cfg to this config so that it gets autoexeced on level change
mp_tournament_whitelist "cfg/tfcl_whitelist_6s.txt"

mp_timelimit "0"                              // unsets server timelimit
mp_winlimit "3"                               // first to 3 rounds wins the match (Best of 5)
mp_windifference "0"                          // unsets windifference
mp_maxrounds "0"                              // unsets maxrounds

mp_tournament_restart                         // restarts the tournament to apply above settings

say "TFCL 6v6 KoTH Best of 5 (Playoffs) Config Executed."
say "First to 3 wins the match. No time limit."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "Exec tfcl_off or restart your server 90 seconds after you have fully finished playing."
