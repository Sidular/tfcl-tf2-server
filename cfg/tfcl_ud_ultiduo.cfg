// TFCL Ultiduo Config (KoTH format)
// EXEC THIS MANUALLY, DO NOT EXEC THE BASE.CFG
// 2v2 Soldier + Medic, KoTH - First to 2 rounds wins.

exec "tfcl_ud_base"

servercfgfile "tfcl_ud_ultiduo"              // sets server cfg to this config so that it gets autoexeced on level change
mp_tournament_whitelist "cfg/tfcl_whitelist_ud.txt"

mp_timelimit "0"                             // unsets server timelimit
mp_winlimit "2"                              // first to 2 rounds wins the match
mp_windifference "0"                         // unsets windifference
mp_maxrounds "0"                             // unsets maxrounds
mp_tournament_stopwatch "0"                  // disables stopwatch mode for KoTH

mp_tournament_restart                        // restarts the tournament to apply above settings

say "TFCL Ultiduo Config Executed."
say "2v2 - Soldier + Medic only. First to win 2 rounds wins the match."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "Exec tfcl_off or restart your server 90 seconds after you have fully finished playing."
