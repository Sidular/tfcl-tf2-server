// TFCL 6v6 5cp Match - Golden Cap config
// EXEC THIS MANUALLY when in golden cap overtime (tied after full match)
// One round sudden death - first to cap wins.

exec "tfcl_6s_base"

servercfgfile "tfcl_6s_5cp_gc"               // sets server cfg to this config so that it gets autoexeced on level change
mp_tournament_whitelist "cfg/tfcl_whitelist_6s.txt"

mp_timelimit "0"                              // unsets timelimit for golden cap
mp_winlimit "1"                               // one round wins the golden cap
mp_windifference "0"                          // unsets windifference
mp_maxrounds "0"                              // unsets maxrounds

mp_tournament_restart                         // restarts the tournament to apply above settings

say "TFCL 6v6 5cp Golden Cap Config Executed."
say "First team to win a round wins the match. No time limit."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "Exec tfcl_off or restart your server 90 seconds after you have fully finished playing."
