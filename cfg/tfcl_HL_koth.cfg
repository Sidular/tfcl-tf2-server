// TFCL Highlander KoTH Config (Regular Season)
// EXEC THIS MANUALLY, DO NOT EXEC THE BASE.CFG
// Winlimit 2, no timelimit, 2 halves. Reexec after one team has won 4 total rounds.

exec "tfcl_HL_base"

servercfgfile "tfcl_HL_koth"                 // sets server cfg to this config so that it gets autoexeced on level change
mp_tournament_whitelist "cfg/tfcl_whitelist_HL.txt"

mp_timelimit "0"                             // unsets server timelimit
mp_winlimit "2"                              // sets number of wins per half to 2
mp_windifference "0"                         // unsets windifference
mp_maxrounds "0"                             // unsets maxrounds

mp_tournament_restart                        // restarts the tournament to apply above settings

say "TFCL Highlander KoTH Config Executed."
say "First to 4 wins the match. Half every 2 rounds."
say "To be safe, please ***CHANGELEVEL*** to reload all settings properly and prevent any crashes."
say "You will need to reexec this config after a team wins a total of 4 rounds."
say "Exec tfcl_off or restart your server 90 seconds after you have fully finished playing."
