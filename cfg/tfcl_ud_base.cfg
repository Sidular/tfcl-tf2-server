// TFCL Ultiduo Base Config
// 2v2 - Soldier + Medic only
// DO NOT EXEC THIS MANUALLY

exec "tfcl_base"                               // execs base config that every gamemode shares
exec "tfcl_any_custom"                         // execs the custom settings in any_custom
exec "tfcl_ultiduo_custom"                     // execs the custom settings in ultiduo_custom

mp_tournament_whitelist "cfg/tfcl_whitelist_ud.txt"  // sets whitelist
tftrue_whitelist_id "tfcl_ultiduo"              // sets tftrue whitelist if you have tftrue installed

tf_tournament_classlimit_scout "0"             // 0 scouts
tf_tournament_classlimit_soldier "1"           // 1 soldier
tf_tournament_classlimit_pyro "0"              // 0 pyros
tf_tournament_classlimit_demoman "0"           // 0 demomen
tf_tournament_classlimit_heavy "0"             // 0 heavies
tf_tournament_classlimit_engineer "0"          // 0 engineers
tf_tournament_classlimit_medic "1"             // 1 medic
tf_tournament_classlimit_sniper "0"            // 0 snipers
tf_tournament_classlimit_spy "0"               // 0 spies
